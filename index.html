  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "url": "https://aiprep365.com/",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://aiprep365.com/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }

  <!-- MathJax Configuration -->

      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
