<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Test Emails to Shashi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        button:hover {
            opacity: 0.9;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .checkbox-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>📧 Send Test Emails to Shashi</h1>
        <p>Send weekly report and due date notifications to Shashi (ssky5771@gmail.com)</p>

        <form id="emailForm">
            <div class="form-group">
                <label for="studentName">Student Name:</label>
                <input type="text" id="studentName" value="Shashi" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" value="ssky5771@gmail.com" required>
            </div>

            <div class="form-group">
                <label>Send Emails:</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="weeklyReport" checked>
                        <label for="weeklyReport">Weekly Report</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="dueDate" checked>
                        <label for="dueDate">Due Date Notification</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="parentNotification" checked>
                        <label for="parentNotification">Parent Notification</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="testName">Test Name (for Due Date):</label>
                <input type="text" id="testName" value="Full Practice Test #3 - SAT Math & Reading" required>
            </div>

            <div class="form-group">
                <label for="dueDate">Due Date:</label>
                <input type="datetime-local" id="dueDate" value="2026-04-05T23:59" required>
            </div>

            <div class="form-group">
                <label for="priority">Priority:</label>
                <select id="priority">
                    <option value="high" selected>High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>

            <div class="form-group">
                <label for="testsAttempted">Tests Attempted (Weekly Report):</label>
                <input type="number" id="testsAttempted" value="5" min="0" max="20">
            </div>

            <div class="form-group">
                <label for="averageScore">Average Score (Weekly Report):</label>
                <input type="number" id="averageScore" value="78" min="0" max="100">
            </div>

            <div class="form-group">
                <label for="currentTotalScore">Current Total Score (Weekly Report):</label>
                <input type="number" id="currentTotalScore" value="1240" min="0" max="1600">
            </div>

            <button type="button" onclick="sendWeeklyReport()">📊 Send Weekly Report</button>
            <button type="button" onclick="sendDueDate()">📅 Send Due Date</button>
            <button type="button" onclick="sendParentNotification()">👨‍👩‍👧‍👦 Send Parent Notification</button>
            <button type="button" onclick="sendAll()">🚀 Send All</button>
        </form>

        <div id="result" class="result"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001/api';

        function showResult(message, isSuccess) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            resultDiv.className = `result ${isSuccess ? 'success' : 'error'}`;
            resultDiv.style.display = 'block';
        }

        async function sendWeeklyReport() {
            try {
                showResult('Sending weekly report...', true);
                
                const response = await fetch(`${API_BASE}/notifications/send-weekly-progress`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        studentId: 'test-student-shashi',
                        customEmail: document.getElementById('email').value,
                        studentName: document.getElementById('studentName').value,
                        includeDetails: true,
                        progressData: {
                            testsAttempted: parseInt(document.getElementById('testsAttempted').value),
                            averageScore: parseInt(document.getElementById('averageScore').value),
                            currentTotalScore: parseInt(document.getElementById('currentTotalScore').value),
                            targetScore: 1600,
                            weeklyGoal: 150,
                            streakDays: 7,
                            practiceTime: 12.5,
                            weakAreas: ['Algebra', 'Geometry'],
                            strongAreas: ['Reading Comprehension', 'Grammar'],
                            achievements: ['Completed 5 tests this week!', 'Maintained 78% average score!'],
                            recommendations: ['Focus on reviewing fundamentals where scores are lower'],
                            upcomingTests: [
                                {
                                    testName: document.getElementById('testName').value,
                                    dueDate: document.getElementById('dueDate').value,
                                    priority: document.getElementById('priority').value
                                }
                            ]
                        }
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showResult('✅ Weekly report sent successfully to ' + document.getElementById('email').value, true);
                } else {
                    showResult('❌ Weekly report failed: ' + data.error, false);
                }
            } catch (error) {
                showResult('💥 Weekly report error: ' + error.message, false);
            }
        }

        async function sendDueDate() {
            try {
                showResult('Sending due date notification...', true);
                
                const response = await fetch(`${API_BASE}/notifications/send-due-date-reminder`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        studentId: 'test-student-shashi',
                        testName: document.getElementById('testName').value,
                        dueDate: document.getElementById('dueDate').value,
                        priority: document.getElementById('priority').value,
                        customEmail: document.getElementById('email').value,
                        studentName: document.getElementById('studentName').value,
                        daysUntilDue: 8,
                        courseDetails: {
                            subject: 'SAT Preparation',
                            level: 'Advanced',
                            duration: '3 hours'
                        }
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showResult('✅ Due date notification sent successfully to ' + document.getElementById('email').value, true);
                } else {
                    showResult('❌ Due date notification failed: ' + data.error, false);
                }
            } catch (error) {
                showResult('💥 Due date notification error: ' + error.message, false);
            }
        }

        async function sendParentNotification() {
            try {
                showResult('Sending parent notification...', true);
                
                const response = await fetch(`${API_BASE}/notifications/send-weekly-progress`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        studentId: 'test-student-shashi',
                        parentId: 'test-parent-shashi',
                        customEmail: document.getElementById('email').value,
                        studentName: document.getElementById('studentName').value,
                        includeDetails: true,
                        progressData: {
                            testsAttempted: parseInt(document.getElementById('testsAttempted').value),
                            averageScore: parseInt(document.getElementById('averageScore').value),
                            currentTotalScore: parseInt(document.getElementById('currentTotalScore').value),
                            targetScore: 1600,
                            weeklyGoal: 150,
                            streakDays: 7,
                            practiceTime: 12.5,
                            weakAreas: ['Algebra', 'Geometry'],
                            strongAreas: ['Reading Comprehension', 'Grammar'],
                            achievements: ['Great progress this week!', 'Consistent practice schedule'],
                            recommendations: ['Continue daily practice for best results'],
                            upcomingTests: [
                                {
                                    testName: document.getElementById('testName').value,
                                    dueDate: document.getElementById('dueDate').value,
                                    priority: document.getElementById('priority').value
                                }
                            ]
                        }
                    })
                });

                const data = await response.json();
                if (data.success) {
                    showResult('✅ Parent notification sent successfully to ' + document.getElementById('email').value, true);
                } else {
                    showResult('❌ Parent notification failed: ' + data.error, false);
                }
            } catch (error) {
                showResult('💥 Parent notification error: ' + error.message, false);
            }
        }

        async function sendAll() {
            if (document.getElementById('weeklyReport').checked) {
                await sendWeeklyReport();
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            
            if (document.getElementById('dueDate').checked) {
                await sendDueDate();
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            
            if (document.getElementById('parentNotification').checked) {
                await sendParentNotification();
            }
        }
    </script>
</body>
</html>
