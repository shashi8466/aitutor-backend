services:
  - type: web
    name: aitutor-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: EMAIL_HOST
        value: mail.gigatechservices.org
      - key: EMAIL_PORT
        value: 465
      - key: EMAIL_SECURE
        value: true
      - key: EMAIL_USER
        value: notifications@gigatechservices.org
      - key: EMAIL_PASS
        value: "Pu$gm;p)$7O+IzCb"
      - key: EMAIL_FROM
        value: notifications@gigatechservices.org
      - key: ADMIN_EMAIL
        value: notifications@gigatechservices.org
      - key: APP_NAME
        value: AIPrep365
      - key: APP_URL
        value: https://aiprep365.com
