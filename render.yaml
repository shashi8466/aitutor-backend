services:
  - type: web
    name: aitutor-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BREVO_API_KEY
        value: SET_IN_RENDER_DASHBOARD
      - key: EMAIL_FROM
        value: ssky57771@gmail.com
      - key: ADMIN_EMAIL
        value: ssky57771@gmail.com
      - key: APP_NAME
        value: AIPrep365
      - key: APP_URL
        value: https://aiprep365.com
