services:
  - type: web
    name: aitutor-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GMAIL_USER
        value: YOUR_GMAIL_USER_HERE
      - key: GMAIL_APP_PASS
        value: YOUR_GMAIL_APP_PASS_HERE
      - key: EMAIL_USER
        value: YOUR_EMAIL_USER_HERE
      - key: EMAIL_PASS
        value: YOUR_EMAIL_PASS_HERE
      - key: EMAIL_FROM
        value: YOUR_EMAIL_FROM_HERE
      - key: APP_NAME
        value: AI Tutor Platform
